<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00FF88" />
    <title>Rave'era offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #020202;
        color: rgba(255, 255, 255, 0.92);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 75% 8%, rgb(0 255 136 / 0.14), transparent 360px),
          #020202;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgb(255 255 255 / 0.08);
        background: rgb(0 0 0 / 0.74);
        padding: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 14px;
        color: #00ff88;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(30px, 8vw, 52px);
        line-height: 0.95;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        margin-top: 24px;
        border: 1px solid #00ff88;
        padding: 0 16px;
        color: #00ff88;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid #00ff88;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Rave'era Group</p>
      <h1>Offline mode</h1>
      <p>
        You are offline. Reconnect to load live event data, dashboard sessions, payments, Telegram
        actions, and check-in updates.
      </p>
      <a href="/">Back to app</a>
    </main>
  </body>
</html>
